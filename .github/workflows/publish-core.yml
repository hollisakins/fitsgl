name: Publish @fitsgl/core

# Publishes fitsgl-core/ to npm when a `core-v<version>` tag is pushed.
# The tag prefix keeps this independent of any future fitsgl-py release tags.
# Requires the repo secret NPM_TOKEN (an npm "Read and write" access token).
on:
  push:
    tags:
      - "core-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitsgl-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: fitsgl-core/package-lock.json

      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/core-v')
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#core-v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # `prepare` builds dist/ before packing; publishConfig sets access+provenance.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
