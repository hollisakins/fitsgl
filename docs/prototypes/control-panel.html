<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FitsGL · control panel prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#06080d; --stage:#04060a; --win:#0d1119; --inset:#080b12;
    --line:rgba(150,170,210,.11); --line2:rgba(150,170,210,.20);
    --text:#cdd5e3; --dim:#828ca3; --faint:#566073;
    --gold:#e0ad4d; --gold-d:#7d6630;
    --r:#ff6b6b; --g:#56d089; --b:#5c8cff;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --sans:'IBM Plex Sans', system-ui, sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body { font-family:var(--mono); color:var(--text); background:var(--bg);
         font-size:12.5px; overflow:hidden; -webkit-font-smoothing:antialiased; }

  .app { display:flex; flex-direction:column; height:100%; }

  /* ───────── stage ───────── */
  .stage { flex:1; position:relative; min-height:0; background:var(--stage); overflow:hidden; }
  .stage canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #overlay { z-index:2; }

  /* ───────── floating control window (top-left, collapsible) ───────── */
  .cwin {
    position:absolute; top:13px; left:13px; width:300px; z-index:5;
    background:color-mix(in srgb, var(--win) 94%, transparent);
    border:1px solid var(--line2); border-radius:5px;
    backdrop-filter:blur(8px); box-shadow:0 10px 34px rgba(0,0,0,.45);
    animation:fade .35s ease both;
  }
  @keyframes fade { from{opacity:0; transform:translateY(-4px)} }
  .cwin-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 12px; cursor:pointer; user-select:none; border-bottom:1px solid var(--line);
  }
  .cwin.collapsed .cwin-head { border-bottom:0; }
  .cwin-head .ttl { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); }
  .cwin-head .chev { color:var(--gold); font-size:10px; transition:transform .2s; }
  .cwin.collapsed .chev { transform:rotate(-90deg); }
  .cwin.collapsed .cwin-body { display:none; }
  .cwin-body { max-height:calc(100vh - 92px); overflow-y:auto; }
  .cwin-body::-webkit-scrollbar { width:8px; }
  .cwin-body::-webkit-scrollbar-thumb { background:var(--line2); border-radius:8px; border:2px solid transparent; background-clip:padding-box; }

  .sec { padding:13px 13px; border-bottom:1px solid var(--line); }
  .sec:last-child { border-bottom:0; }
  .row { display:flex; align-items:center; gap:9px; }
  .row + .row { margin-top:9px; }
  .cap { font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint);
         margin-bottom:9px; display:block; }
  .cap.inline { margin:0; min-width:50px; }

  /* segmented (mode only) */
  .seg { display:flex; gap:2px; background:var(--inset); border:1px solid var(--line); border-radius:4px; padding:2px; }
  .seg button { flex:1; appearance:none; border:0; background:transparent; color:var(--dim);
    font-family:var(--mono); font-size:11px; letter-spacing:.06em; padding:6px 4px; border-radius:3px;
    cursor:pointer; transition:.15s; }
  .seg button:hover { color:var(--text); }
  .seg button[aria-pressed="true"] { background:var(--gold); color:#161003; font-weight:500; }

  /* native select */
  .sel { position:relative; flex:1; }
  .sel::after { content:"▾"; position:absolute; right:11px; top:50%; transform:translateY(-50%);
                color:var(--gold); pointer-events:none; font-size:10px; }
  select { width:100%; appearance:none; background:var(--inset); color:var(--text);
    border:1px solid var(--line2); border-radius:4px; padding:8px 11px; font-family:var(--mono);
    font-size:12px; cursor:pointer; }
  select:focus { outline:none; border-color:var(--gold-d); }

  /* RGB radio grid */
  .grid { display:grid; gap:6px 5px; }
  .grid .bandhead { font-size:9.5px; color:var(--dim); text-align:center; white-space:nowrap; }
  .grid .bandhead small { display:block; color:var(--faint); font-size:8px; }
  .grid .chlab { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; letter-spacing:.08em; }
  .grid .chlab .dot { width:8px; height:8px; border-radius:50%; }
  .ch-r{color:var(--r)} .ch-g{color:var(--g)} .ch-b{color:var(--b)}
  .ch-r .dot{background:var(--r)} .ch-g .dot{background:var(--g)} .ch-b .dot{background:var(--b)}
  .cell { display:flex; align-items:center; justify-content:center; }
  .radio { width:16px; height:16px; border-radius:50%; border:1.5px solid var(--line2);
           cursor:pointer; transition:.14s; position:relative; background:var(--inset); }
  .radio:hover { border-color:var(--dim); }
  .radio.on { border-color:currentColor; }
  .radio.on::after { content:""; position:absolute; inset:3px; border-radius:50%; background:currentColor; }
  .cell.r .radio.on{color:var(--r)} .cell.g .radio.on{color:var(--g)} .cell.b .radio.on{color:var(--b)}
  .radio.disabled { opacity:.16; cursor:not-allowed; pointer-events:none; }
  .gnote { margin-top:9px; font-size:9.5px; color:var(--faint); letter-spacing:.02em; }
  .gnote b { color:var(--gold); font-weight:500; }

  /* dual-range limits + histogram */
  .dr { margin-top:11px; }
  .dr-top { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
  .dr-top .sw { width:7px; height:7px; border-radius:2px; }
  .dr-top .nm { font-size:10.5px; color:var(--text); flex:1; letter-spacing:.03em; }
  .dr-top .vals { font-size:9.5px; color:var(--dim); font-variant-numeric:tabular-nums; }
  .dr-track { position:relative; height:32px; }
  .dr-track canvas { position:absolute; inset:0 0 8px; width:100%; height:24px;
                     border:1px solid var(--line); border-radius:3px; background:var(--inset); }
  .dr-fill { position:absolute; bottom:8px; height:24px; background:rgba(224,173,77,.09);
             border-left:1px solid var(--gold); border-right:1px solid var(--gold); pointer-events:none; }
  .dr input[type=range] { position:absolute; left:0; right:0; bottom:-3px; width:100%; height:16px;
    margin:0; appearance:none; background:none; pointer-events:none; }
  .dr input[type=range]::-webkit-slider-thumb { appearance:none; pointer-events:auto; width:10px; height:17px;
    border-radius:2px; background:var(--gold); border:1px solid #161003; cursor:ew-resize; }
  .dr input[type=range]::-moz-range-thumb { pointer-events:auto; width:10px; height:17px; border-radius:2px;
    border:1px solid #161003; background:var(--gold); cursor:ew-resize; }
  .dr.tint-r input::-webkit-slider-thumb{background:var(--r)} .dr.tint-r .dr-fill{border-color:var(--r);background:rgba(255,107,107,.09)}
  .dr.tint-g input::-webkit-slider-thumb{background:var(--g)} .dr.tint-g .dr-fill{border-color:var(--g);background:rgba(86,208,137,.09)}
  .dr.tint-b input::-webkit-slider-thumb{background:var(--b)} .dr.tint-b .dr-fill{border-color:var(--b);background:rgba(92,140,255,.09)}
  .dr.tint-r input::-moz-range-thumb{background:var(--r)}.dr.tint-g input::-moz-range-thumb{background:var(--g)}.dr.tint-b input::-moz-range-thumb{background:var(--b)}

  /* colormap preview dropdown */
  .cm { position:relative; }
  .cm-trigger { display:flex; align-items:center; gap:9px; width:100%; cursor:pointer;
    background:var(--inset); border:1px solid var(--line2); border-radius:4px; padding:6px 9px; }
  .cm-trigger .bar { flex:1; height:13px; border-radius:2px; border:1px solid rgba(0,0,0,.3); }
  .cm-trigger .nm { font-size:11px; color:var(--text); min-width:54px; }
  .cm-trigger .chev { color:var(--gold); font-size:10px; }
  .cm-menu { position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:8;
    background:var(--win); border:1px solid var(--line2); border-radius:4px; padding:4px; box-shadow:0 8px 22px rgba(0,0,0,.5); }
  .cm-opt { display:flex; align-items:center; gap:9px; padding:5px 6px; border-radius:3px; cursor:pointer; }
  .cm-opt:hover { background:rgba(150,170,210,.08); }
  .cm-opt.on { background:rgba(224,173,77,.12); }
  .cm-opt .bar { flex:1; height:12px; border-radius:2px; }
  .cm-opt .nm { font-size:10.5px; color:var(--dim); min-width:54px; }
  .cm-opt.on .nm { color:var(--gold); }

  /* toggles (no descriptions) */
  .tg { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
  .tg .tx { font-size:11.5px; color:var(--text); letter-spacing:.03em; }
  .switch { width:34px; height:19px; border-radius:10px; background:var(--inset); border:1px solid var(--line2);
            position:relative; transition:.18s; flex:none; }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:13px; height:13px; border-radius:50%;
    background:var(--dim); transition:.18s; }
  .tg.on .switch { background:var(--gold); border-color:var(--gold); }
  .tg.on .switch::after { left:17px; background:#161003; }

  .reset { width:100%; appearance:none; cursor:pointer; background:transparent; border:1px solid var(--line2);
    color:var(--dim); font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    padding:9px; border-radius:4px; transition:.15s; }
  .reset:hover { border-color:var(--gold-d); color:var(--gold); }

  /* ───────── status bar ───────── */
  .statusbar { flex:none; height:29px; display:flex; align-items:center; gap:0;
    background:#080b12; border-top:1px solid var(--line2); padding:0 12px; font-size:11px;
    overflow:hidden; white-space:nowrap; }
  .statusbar .brand { color:var(--gold); font-weight:600; letter-spacing:.16em; font-size:10.5px; }
  .statusbar .item { display:flex; align-items:center; gap:6px; padding:0 13px; }
  .statusbar .item i { font-style:normal; color:var(--faint); font-size:9px; letter-spacing:.14em; text-transform:uppercase; }
  .statusbar .item b { font-weight:500; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:.02em; }
  .statusbar .item b.gold { color:var(--gold); }
  .statusbar .div { width:1px; height:14px; background:var(--line2); }
  .statusbar .spacer { flex:1; }
  .statusbar .item.coord b { min-width:96px; display:inline-block; }

  .hidden { display:none !important; }
</style>
</head>
<body>
<div class="app">
  <div class="stage" id="stage">
    <canvas id="image"></canvas>
    <canvas id="overlay"></canvas>

    <!-- floating control window -->
    <div class="cwin" id="cwin">
      <div class="cwin-head" id="cwin-head">
        <span class="ttl">Display</span>
        <span class="chev">▾</span>
      </div>
      <div class="cwin-body">

        <!-- layers -->
        <div class="sec">
          <span class="cap">Layers</span>
          <div class="seg" id="mode">
            <button data-mode="single" aria-pressed="false">Single</button>
            <button data-mode="rgb" aria-pressed="true">RGB</button>
          </div>

          <div id="single-pick" class="hidden" style="margin-top:9px">
            <div class="sel"><select id="band-select"></select></div>
          </div>

          <div id="rgb-pick" style="margin-top:11px">
            <div class="grid" id="rgb-grid"></div>
            <div class="gnote">RGB requires <b>co&#8209;gridded</b> bands — cross-grid filters grey out.</div>
          </div>
        </div>

        <!-- scaling -->
        <div class="sec">
          <span class="cap">Scaling</span>
          <div class="row">
            <span class="cap inline">Stretch</span>
            <div class="sel">
              <select id="stretch-select">
                <option value="linear">Linear</option>
                <option value="asinh" selected>Asinh</option>
                <option value="log">Log</option>
              </select>
            </div>
          </div>

          <div id="limits"></div>

          <div id="cmap-block" class="hidden" style="margin-top:11px">
            <div class="row">
              <span class="cap inline">Colormap</span>
              <div class="cm" id="cm">
                <div class="cm-trigger" id="cm-trigger">
                  <span class="bar"></span><span class="nm"></span><span class="chev">▾</span>
                </div>
                <div class="cm-menu hidden" id="cm-menu"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- view -->
        <div class="sec">
          <span class="cap">View</span>
          <div class="tg on" id="tg-north"><span class="tx">North up</span><span class="switch"></span></div>
          <div class="row"></div>
          <div class="tg" id="tg-overlay"><span class="tx">Catalog overlay</span><span class="switch"></span></div>
        </div>

        <div class="sec">
          <button class="reset" id="reset">Reset view</button>
        </div>
      </div>
    </div>
  </div>

  <!-- status bar -->
  <div class="statusbar">
    <span class="brand">FITSGL</span>
    <span class="item"><i>field</i><b>COSMOS&#8209;Web</b></span>
    <span class="div"></span>
    <span class="item"><i>mode</i><b id="sb-mode">RGB</b></span>
    <span class="item"><i>bands</i><b id="sb-bands">—</b></span>
    <span class="item"><i>stretch</i><b id="sb-stretch">asinh</b></span>
    <span class="spacer"></span>
    <span class="item coord"><i>α</i><b id="sb-ra">—</b></span>
    <span class="item coord"><i>δ</i><b id="sb-dec">—</b></span>
    <span class="item"><i>value</i><b id="sb-val" class="gold">—</b></span>
  </div>
</div>

<script>
"use strict";
const RES = 480;
const BANDS = [
  { name:'f090w',    label:'F090W', group:0, wl:0.90, scale:0.030 },
  { name:'f150w',    label:'F150W', group:0, wl:1.50, scale:0.030 },
  { name:'f277w',    label:'F277W', group:0, wl:2.77, scale:0.030 },
  { name:'f444w',    label:'F444W', group:0, wl:4.44, scale:0.030 },
  { name:'subaru_r', label:'Subaru r', group:1, wl:0.62, scale:0.168 },
];
const byName = Object.fromEntries(BANDS.map(b=>[b.name,b]));

const DEFAULT = {
  mode:'rgb',
  single:{ band:'f444w', colormap:'gray' },
  rgb:{ r:'f444w', g:'f277w', b:'f150w' },
  stretch:'asinh', limits:{}, northUp:true, overlay:false,
};
BANDS.forEach(b=> DEFAULT.limits[b.name] = { min:3, max:62 });
let S = structuredClone(DEFAULT);

// ───────── colormaps ─────────
const CMAPS = {
  gray:[[0,0,0],[255,255,255]],
  viridis:[[68,1,84],[59,82,139],[33,144,140],[93,201,99],[253,231,37]],
  inferno:[[0,0,4],[87,16,110],[188,55,84],[249,142,9],[252,255,164]],
  magma:[[0,0,4],[81,18,124],[183,55,121],[252,137,97],[252,253,191]],
  cividis:[[0,32,76],[0,67,88],[123,121,120],[190,184,111],[255,234,70]],
};
function cmapLUT(stops){
  const lut=new Uint8Array(768);
  for(let i=0;i<256;i++){ const t=i/255,seg=t*(stops.length-1),k=Math.min(stops.length-2,Math.floor(seg)),f=seg-k;
    for(let c=0;c<3;c++) lut[i*3+c]=stops[k][c]+(stops[k+1][c]-stops[k][c])*f; }
  return lut;
}
const LUTS=Object.fromEntries(Object.entries(CMAPS).map(([k,v])=>[k,cmapLUT(v)]));
function gradCss(lut){ let s='linear-gradient(90deg,'; for(let i=0;i<=8;i++){ const q=((i/8)*255)|0;
  s+=`rgb(${lut[q*3]},${lut[q*3+1]},${lut[q*3+2]}) ${i/8*100}%${i<8?',':''}`; } return s+')'; }

// ───────── synthesize deep field ─────────
const fields={}, hists={}; let markers=[];
function rnd(){ return Math.random(); }
function buildField(){
  const N=190, srcs=[];
  for(let i=0;i<N;i++) srcs.push({ x:rnd()*RES, y:rnd()*RES, r:2+Math.pow(rnd(),2.2)*17,
    base:0.18+Math.pow(rnd(),2)*0.9, slope:rnd()*2-1 });
  for(let i=0;i<6;i++) srcs.push({ x:rnd()*RES, y:rnd()*RES, r:3+rnd()*4, base:1.0, slope:rnd()*1.4-0.7 });

  const off=document.createElement('canvas'); off.width=off.height=RES; const oc=off.getContext('2d');
  for(const band of BANDS){
    oc.globalCompositeOperation='source-over'; oc.fillStyle='#000'; oc.fillRect(0,0,RES,RES);
    oc.globalCompositeOperation='lighter';
    for(const s of srcs){
      const amp=Math.max(0.04,s.base*(1+s.slope*((band.wl-1.6)/3.2)));
      const g=oc.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
      g.addColorStop(0,`rgba(255,255,255,${Math.min(1,amp)})`); g.addColorStop(1,'rgba(255,255,255,0)');
      oc.fillStyle=g; oc.beginPath(); oc.arc(s.x,s.y,s.r,0,7); oc.fill();
    }
    const px=oc.getImageData(0,0,RES,RES).data, buf=new Float32Array(RES*RES); let mx=0;
    for(let i=0;i<RES*RES;i++){ const v=px[i*4]/255+rnd()*0.05; buf[i]=v; if(v>mx)mx=v; }
    for(let i=0;i<buf.length;i++) buf[i]/=mx;
    fields[band.name]=buf;
    const h=new Float32Array(64);
    for(let i=0;i<buf.length;i++) h[Math.min(63,(buf[i]*64)|0)]++;
    let hm=0; for(let i=0;i<64;i++){ h[i]=Math.log1p(h[i]); if(h[i]>hm)hm=h[i]; }
    for(let i=0;i<64;i++) h[i]/=hm||1; hists[band.name]=h;
  }
  markers=srcs.filter(s=>s.base>0.7).slice(0,16).map(s=>({x:s.x/RES,y:s.y/RES}));
}

// ───────── stretch + render ─────────
function stretchFn(t,mode){ t=t<0?0:t>1?1:t;
  if(mode==='linear') return t; if(mode==='log') return Math.log1p(t*49)/Math.log1p(49);
  return Math.asinh(t*8)/Math.asinh(8); }
function applyChannel(out,off,buf,lim,mode){
  const m0=lim.min/100,m1=Math.max(lim.min/100+1e-3,lim.max/100),inv=1/(m1-m0);
  for(let i=0;i<buf.length;i++) out[i*4+off]=stretchFn((buf[i]-m0)*inv,mode)*255;
}
function applyRGBfromLUT(out,buf,lim,mode,lut){
  const m0=lim.min/100,m1=Math.max(lim.min/100+1e-3,lim.max/100),inv=1/(m1-m0);
  for(let i=0;i<buf.length;i++){ const v=stretchFn((buf[i]-m0)*inv,mode),q=(v*255)|0,p=i*4;
    out[p]=lut[q*3]; out[p+1]=lut[q*3+1]; out[p+2]=lut[q*3+2]; }
}
const imgCanvas=document.getElementById('image'), ictx=imgCanvas.getContext('2d');
imgCanvas.width=imgCanvas.height=RES; let imgData=ictx.createImageData(RES,RES), raf=0;
function render(){ raf=0; const d=imgData.data; d.fill(0); for(let i=3;i<d.length;i+=4) d[i]=255;
  if(S.mode==='single'){ const b=S.single.band; applyRGBfromLUT(d,fields[b],S.limits[b],S.stretch,LUTS[S.single.colormap]); }
  else { applyChannel(d,0,fields[S.rgb.r],S.limits[S.rgb.r],S.stretch);
         applyChannel(d,1,fields[S.rgb.g],S.limits[S.rgb.g],S.stretch);
         applyChannel(d,2,fields[S.rgb.b],S.limits[S.rgb.b],S.stretch); }
  ictx.putImageData(imgData,0,0);
}
function scheduleRender(){ if(!raf) raf=requestAnimationFrame(render); }

// ───────── overlay (markers / crosshair / compass) ─────────
const ovCanvas=document.getElementById('overlay'), octx=ovCanvas.getContext('2d'); let hover=null;
function sizeOverlay(){ const r=ovCanvas.getBoundingClientRect(), dpr=devicePixelRatio||1;
  ovCanvas.width=r.width*dpr; ovCanvas.height=r.height*dpr; octx.setTransform(dpr,0,0,dpr,0,0); drawOverlay(); }
function drawOverlay(){
  const w=ovCanvas.width/(devicePixelRatio||1), h=ovCanvas.height/(devicePixelRatio||1); octx.clearRect(0,0,w,h);
  if(S.overlay){ octx.strokeStyle='rgba(224,173,77,.85)'; octx.lineWidth=1.3;
    for(const m of markers){ octx.beginPath(); octx.arc(m.x*w,m.y*h,8,0,7); octx.stroke(); } }
  if(S.northUp){ const x=w-40,y=44; octx.strokeStyle='rgba(205,213,227,.45)'; octx.fillStyle='rgba(205,213,227,.65)'; octx.lineWidth=1.1;
    octx.beginPath(); octx.moveTo(x,y+13); octx.lineTo(x,y-13); octx.stroke();
    octx.beginPath(); octx.moveTo(x-4,y-8); octx.lineTo(x,y-14); octx.lineTo(x+4,y-8); octx.stroke();
    octx.font='10px IBM Plex Mono'; octx.fillText('N',x-3,y-18); }
  if(hover){ octx.strokeStyle='rgba(224,173,77,.6)'; octx.lineWidth=1;
    octx.beginPath();
    octx.moveTo(hover.x-12,hover.y); octx.lineTo(hover.x-4,hover.y); octx.moveTo(hover.x+4,hover.y); octx.lineTo(hover.x+12,hover.y);
    octx.moveTo(hover.x,hover.y-12); octx.lineTo(hover.x,hover.y-4); octx.moveTo(hover.x,hover.y+4); octx.lineTo(hover.x,hover.y+12);
    octx.stroke(); octx.strokeRect(hover.x-12,hover.y-12,24,24); }
}

// ───────── status-bar readout ─────────
const RA0=150.1163, DEC0=2.2058;
const $=id=>document.getElementById(id);
function updateReadout(nx,ny){
  const b=S.mode==='single'?byName[S.single.band]:byName[S.rgb.r], sc=b.scale/3600;
  const ra=RA0-(nx-0.5)*RES*sc/Math.cos(DEC0*Math.PI/180), dec=DEC0-(ny-0.5)*RES*sc;
  $('sb-ra').textContent=fmtRA(ra); $('sb-dec').textContent=fmtDec(dec);
  const buf=fields[S.mode==='single'?S.single.band:S.rgb.r];
  const px=Math.min(RES-1,(nx*RES)|0), py=Math.min(RES-1,(ny*RES)|0);
  $('sb-val').textContent=(buf[py*RES+px]*1e3).toFixed(1);
}
function fmtRA(d){ d=((d%360)+360)%360; const h=d/15,H=h|0,m=(h-H)*60,M=m|0,s=(m-M)*60; return `${z(H)}:${z(M)}:${s.toFixed(1)}`; }
function fmtDec(d){ const sg=d<0?'−':'+'; d=Math.abs(d); const D=d|0,m=(d-D)*60,M=m|0,s=(m-M)*60; return `${sg}${z(D)}:${z(M)}:${s.toFixed(1)}`; }
function z(n){ return String(n).padStart(2,'0'); }
$('stage').addEventListener('mousemove',e=>{ const r=ovCanvas.getBoundingClientRect();
  const nx=(e.clientX-r.left)/r.width, ny=(e.clientY-r.top)/r.height;
  if(nx<0||nx>1||ny<0||ny>1){ hover=null; drawOverlay(); return; }
  hover={x:e.clientX-r.left,y:e.clientY-r.top}; drawOverlay(); updateReadout(nx,ny); });
$('stage').addEventListener('mouseleave',()=>{ hover=null; drawOverlay();
  $('sb-ra').textContent='—'; $('sb-dec').textContent='—'; $('sb-val').textContent='—'; });

// ───────── meta (status bar) ─────────
function updateMeta(){
  $('sb-mode').textContent = S.mode==='single'?'Single':'RGB';
  $('sb-stretch').textContent = S.stretch;
  $('sb-bands').textContent = S.mode==='single'
    ? byName[S.single.band].label
    : `${byName[S.rgb.r].label}·${byName[S.rgb.g].label}·${byName[S.rgb.b].label}`;
}

// ───────── collapse window ─────────
$('cwin-head').addEventListener('click',()=>$('cwin').classList.toggle('collapsed'));

// ───────── mode ─────────
const modeSeg=$('mode');
modeSeg.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return; S.mode=b.dataset.mode; syncMode(); scheduleRender(); });
function syncMode(){
  [...modeSeg.children].forEach(b=>b.setAttribute('aria-pressed', b.dataset.mode===S.mode));
  $('single-pick').classList.toggle('hidden',S.mode!=='single');
  $('rgb-pick').classList.toggle('hidden',S.mode!=='rgb');
  $('cmap-block').classList.toggle('hidden',S.mode!=='single');
  buildLimits(); updateMeta();
}

// ───────── single band select ─────────
const bandSelect=$('band-select');
BANDS.forEach(b=>{ const o=document.createElement('option'); o.value=b.name;
  o.textContent=`${b.label} · ${b.group===0?'NIRCam':'Subaru'}`; bandSelect.appendChild(o); });
bandSelect.addEventListener('change',()=>{ S.single.band=bandSelect.value; buildLimits(); updateMeta(); scheduleRender(); });

// ───────── RGB grid ─────────
const grid=$('rgb-grid');
function buildGrid(){
  grid.style.gridTemplateColumns=`38px repeat(${BANDS.length},1fr)`; grid.innerHTML='';
  grid.appendChild(el('div'));
  BANDS.forEach(b=>{ const h=el('div','bandhead'); h.innerHTML=`${b.label}<small>${b.group===0?'NIRCam':'Subaru'}</small>`; grid.appendChild(h); });
  ['r','g','b'].forEach(ch=>{
    const lab=el('div',`chlab ch-${ch}`); lab.innerHTML=`<span class="dot"></span>${ch.toUpperCase()}`; grid.appendChild(lab);
    BANDS.forEach(b=>{ const cell=el('div',`cell ${ch}`); const radio=el('div','radio');
      radio.dataset.ch=ch; radio.dataset.band=b.name; radio.addEventListener('click',()=>pickRGB(ch,b.name));
      cell.appendChild(radio); grid.appendChild(cell); });
  });
  syncGrid();
}
function pickRGB(ch,band){ S.rgb[ch]=band; syncGrid(); buildLimits(); updateMeta(); scheduleRender(); }
function activeGroup(){ for(const c of ['r','g','b']) if(S.rgb[c]) return byName[S.rgb[c]].group; return null; }
function syncGrid(){ const ag=activeGroup();
  grid.querySelectorAll('.radio').forEach(r=>{ const ch=r.dataset.ch,b=byName[r.dataset.band],on=S.rgb[ch]===r.dataset.band;
    r.classList.toggle('on',on); r.classList.toggle('disabled', ag!==null && b.group!==ag && !on); }); }

// ───────── stretch dropdown ─────────
const stretchSel=$('stretch-select');
stretchSel.addEventListener('change',()=>{ S.stretch=stretchSel.value; for(const d of drawHists) d(); updateMeta(); scheduleRender(); });

// ───────── limits ─────────
const limitsHost=$('limits'); let drawHists=[];
function buildLimits(){ limitsHost.innerHTML=''; drawHists=[];
  if(S.mode==='single') addDualRange(byName[S.single.band], byName[S.single.band].label, '');
  else { addDualRange(byName[S.rgb.r],'R · '+byName[S.rgb.r].label,'r');
         addDualRange(byName[S.rgb.g],'G · '+byName[S.rgb.g].label,'g');
         addDualRange(byName[S.rgb.b],'B · '+byName[S.rgb.b].label,'b'); } }
function addDualRange(band,name,tint){
  const lim=S.limits[band.name], wrap=el('div',`dr ${tint?'tint-'+tint:''}`);
  const sw=tint==='r'?'var(--r)':tint==='g'?'var(--g)':tint==='b'?'var(--b)':'var(--gold)';
  wrap.innerHTML=`<div class="dr-top"><span class="sw" style="background:${sw}"></span>
    <span class="nm">${name}</span><span class="vals"></span></div>
    <div class="dr-track"><canvas></canvas><div class="dr-fill"></div>
      <input type="range" class="lo" min="0" max="100" step="0.5" value="${lim.min}">
      <input type="range" class="hi" min="0" max="100" step="0.5" value="${lim.max}"></div>`;
  limitsHost.appendChild(wrap);
  const lo=wrap.querySelector('.lo'),hi=wrap.querySelector('.hi'),fill=wrap.querySelector('.dr-fill'),
        vals=wrap.querySelector('.vals'),hcv=wrap.querySelector('canvas');
  function paint(){ lim.min=Math.min(+lo.value,+hi.value-1); lim.max=Math.max(+hi.value,+lo.value+1);
    lo.value=lim.min; hi.value=lim.max; fill.style.left=lim.min+'%'; fill.style.width=(lim.max-lim.min)+'%';
    vals.textContent=`${lim.min.toFixed(0)} – ${lim.max.toFixed(0)}`; }
  function drawHist(){ const r=hcv.getBoundingClientRect(),dpr=devicePixelRatio||1;
    hcv.width=r.width*dpr; hcv.height=r.height*dpr; const c=hcv.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0);
    c.clearRect(0,0,r.width,r.height); const h=hists[band.name],n=h.length,bw=r.width/n;
    c.fillStyle=tint==='r'?'rgba(255,107,107,.42)':tint==='g'?'rgba(86,208,137,.42)':tint==='b'?'rgba(92,140,255,.42)':'rgba(224,173,77,.42)';
    for(let i=0;i<n;i++){ const v=stretchFn(h[i],S.stretch); c.fillRect(i*bw,r.height-v*r.height,bw-0.5,v*r.height); } }
  lo.addEventListener('input',()=>{ paint(); scheduleRender(); });
  hi.addEventListener('input',()=>{ paint(); scheduleRender(); });
  paint(); requestAnimationFrame(drawHist); drawHists.push(drawHist);
}

// ───────── colormap preview dropdown ─────────
const cmMenu=$('cm-menu'), cmTrigger=$('cm-trigger');
Object.keys(CMAPS).forEach(name=>{ const opt=el('div','cm-opt'); opt.dataset.cm=name;
  opt.innerHTML=`<span class="bar" style="background:${gradCss(LUTS[name])}"></span><span class="nm">${name}</span>`;
  opt.addEventListener('click',e=>{ e.stopPropagation(); S.single.colormap=name; syncCmap(); cmMenu.classList.add('hidden'); scheduleRender(); });
  cmMenu.appendChild(opt); });
cmTrigger.addEventListener('click',e=>{ e.stopPropagation(); cmMenu.classList.toggle('hidden'); });
document.addEventListener('click',()=>cmMenu.classList.add('hidden'));
function syncCmap(){ const lut=LUTS[S.single.colormap];
  cmTrigger.querySelector('.bar').style.background=gradCss(lut);
  cmTrigger.querySelector('.nm').textContent=S.single.colormap;
  cmMenu.querySelectorAll('.cm-opt').forEach(o=>o.classList.toggle('on',o.dataset.cm===S.single.colormap)); }

// ───────── toggles + reset ─────────
$('tg-north').addEventListener('click',function(){ S.northUp=!S.northUp; this.classList.toggle('on',S.northUp); drawOverlay(); });
$('tg-overlay').addEventListener('click',function(){ S.overlay=!S.overlay; this.classList.toggle('on',S.overlay); drawOverlay(); });
$('reset').addEventListener('click',()=>{ S=structuredClone(DEFAULT); syncAll(); scheduleRender(); });

function syncAll(){ syncMode(); syncGrid(); syncCmap(); bandSelect.value=S.single.band; stretchSel.value=S.stretch;
  $('tg-north').classList.toggle('on',S.northUp); $('tg-overlay').classList.toggle('on',S.overlay); drawOverlay(); }
function el(tag,cls){ const e=document.createElement(tag); if(cls)e.className=cls; return e; }

// ───────── boot ─────────
buildField(); buildGrid(); buildLimits(); syncAll(); render(); sizeOverlay();
addEventListener('resize',()=>{ sizeOverlay(); for(const d of drawHists) d(); });
</script>
</body>
</html>
